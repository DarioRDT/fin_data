<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נתונים פיננסיים</title>
    <script src="https://cdn.tailwindcss.com"></script>
<style>
    /* הוספתי padding-left של 20px כדי להזיז את כל התוכן ימינה */
    .iframe-container {
        position: relative;
        width: 100%;
        height: 520px;
        overflow: hidden;
        border-radius: 12px;
        padding-left: 20px; 
    }
    .iframe-container iframe {
        position: absolute;
        top: -30px;
        left: 0;
        width: 100%;
        height: 600px;
    }
</style>
</head>
<body class="bg-gray-100 p-4 font-sans">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">נתונים פיננסיים</h1>
            <button onclick="location.reload()" class="bg-blue-600 text-white p-2 rounded-full shadow-lg hover:bg-blue-700 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </header>

        <div class="iframe-container shadow-xl border border-gray-200">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTUwhU07H052ig3Z2AAU-yL_XAYKl7l1ptC4zRJdVnMlr00z2MNpohgJymijqDN55XAB1HjRgtE1KyT/pubhtml?gid=0&amp;single=true&amp;widget=false&amp;headers=false"></iframe>
        </div>
    </div>

</body>
</html>
